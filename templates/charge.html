{% extends "layout.html" %}
{% block content %}

<section class="charge-page">
    <div class="form-wrapper">

        <div class="form-header">
            <span class="form-icon">🏥</span>
            <h1>Estimate Your Charges</h1>
            <p>Fill in your details below and we'll predict your annual insurance cost.</p>
        </div>

        <!-- novalidate disables all native browser validation -->
        <form action="/predict" method="POST" class="predict-form" id="predict-form" novalidate>

            <!-- Row 1: Age + BMI -->
            <div class="form-row">
                <div class="form-group">
                    <label for="age">Age</label>
                    <input type="number" id="age" name="age"
                           placeholder="e.g. 32" autocomplete="off">
                    <span class="error-msg" id="age-error" role="alert" hidden></span>
                </div>
                <div class="form-group">
                    <label for="bmi">BMI</label>
                    <input type="number" id="bmi" name="bmi" step="0.1"
                           placeholder="e.g. 24.5" autocomplete="off">
                    <span class="error-msg" id="bmi-error" role="alert" hidden></span>
                </div>
            </div>

            <!-- Children -->
            <div class="form-group">
                <label for="ch">Number of Children</label>
                <input type="number" id="ch" name="ch"
                       placeholder="e.g. 2" autocomplete="off">
                <span class="error-msg" id="ch-error" role="alert" hidden></span>
            </div>

            <hr class="form-divider">

            <!-- Sex -->
            <div class="form-group">
                <label>Sex</label>
                <div class="toggle-group" id="gens-group">
                    {% for gen in sex_unique %}
                    <input type="radio" id="sex_{{ gen }}" name="gens" value="{{ gen }}">
                    <label for="sex_{{ gen }}">{{ gen | capitalize }}</label>
                    {% endfor %}
                    <span class="error-msg" role="alert" hidden></span>
                </div>
            </div>

            <!-- Smoker -->
            <div class="form-group">
                <label>Smoker</label>
                <div class="toggle-group" id="smoker-group">
                    {% for q in smoker_unique %}
                    <input type="radio" id="smoker_{{ q }}" name="smoker" value="{{ q }}">
                    <label for="smoker_{{ q }}">{{ q | capitalize }}</label>
                    {% endfor %}
                    <span class="error-msg" role="alert" hidden></span>
                </div>
            </div>

            <!-- Region -->
            <div class="form-group">
                <label for="regions">Region</label>
                <select id="regions" name="regions">
                    <option value="" disabled selected>Select your US region…</option>
                    {% for reg in region_unique %}
                    <option value="{{ reg }}">{{ reg | capitalize }}</option>
                    {% endfor %}
                </select>
                <span class="error-msg" id="regions-error" role="alert" hidden></span>
            </div>

            <div class="form-submit">
                <button type="submit" class="btn-predict" id="submit-btn">
                    Calculate My Estimate
                </button>
            </div>

        </form>
    </div>
</section>

<!-- JS validator — loaded after DOM is ready -->
<script src="{{ url_for('static', filename='js/validate.js') }}" defer></script>

{% endblock content %}
